<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Yennayer 2025/2026 - Gestion d'Événement</title><style>:root{--primary:#2c3e50;--accent:#e74c3c;--success:#27ae60;--light:#ecf0f1;--white:#fff;--gray:#95a5a6;--text:#2c3e50}*{margin:0;padding:0;box-sizing:border-box}body{font-family:Segoe UI,sans-serif;background:linear-gradient(135deg,#f5f7fa 0%,#c3cfe2 100%);min-height:100vh;padding:20px;color:var(--text)}.container{max-width:1200px;margin:0 auto}header{text-align:center;margin-bottom:40px}header h1{font-size:2.5em;color:var(--primary);margin-bottom:10px}header p{font-size:1.1em;color:var(--gray)}.tabs{display:flex;gap:10px;margin-bottom:30px;border-bottom:3px solid var(--light);padding-bottom:15px;flex-wrap:wrap}.tab-btn{padding:12px 24px;border:none;background:var(--light);color:var(--text);cursor:pointer;border-radius:8px;font-weight:600;transition:all .3s}.tab-btn.active{background:var(--accent);color:var(--white)}.content{display:none}.content.active{display:block}.card{background:var(--white);border-radius:12px;padding:30px;box-shadow:0 4px 20px rgba(0,0,0,.1);margin-bottom:20px}.card h2{color:var(--primary);font-size:1.8em;margin-bottom:20px;border-bottom:3px solid var(--accent);padding-bottom:10px}.team-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px}.team-card{background:linear-gradient(135deg,#f8f9fa 0%,#ecf0f1 100%);border-radius:10px;padding:20px;border-left:5px solid var(--accent)}.form-group{display:flex;gap:10px;margin-bottom:15px}.form-group input{flex:1;padding:12px;border:2px solid var(--light);border-radius:8px}.form-group button,button{background:var(--accent);color:var(--white);border:none;padding:10px 15px;border-radius:6px;cursor:pointer;font-weight:600}.form-group button:hover,button:hover{background:#c0392b}.list{list-style:none;margin-top:15px}.list li{background:#f8f9fa;padding:10px;margin-bottom:8px;border-radius:6px;border-left:4px solid var(--accent);display:flex;justify-content:space-between;align-items:center}.list button{padding:5px 10px;font-size:.85em;background:#e74c3c;cursor:pointer}.sync-buttons{display:flex;gap:10px;margin-bottom:20px}.sync-buttons button{padding:10px 20px;font-size:0.9em}.footer{text-align:center;padding:20px;color:var(--gray);margin-top:40px}</style></head><body><div class="container"><header><h1>🎉 YENNAYER 2025/2026</h1><p>Gestion d'Événement - INSIM</p></header><div class="sync-buttons"><button onclick="exportData()">💾 Exporter</button><button onclick="importData()">📛 Importer</button><button onclick="syncWithGitHub()">🔄 Sync GitHub</button></div><div class="tabs"><button class="tab-btn active" onclick="switchTab('equipes')">👥 Équipes</button><button class="tab-btn" onclick="switchTab('achat')">📋 Achat</button><button class="tab-btn" onclick="switchTab('programme')">📅 Programme</button></div><div id="equipes" class="content active"><div class="card"><h2>👥 Gestion des Équipes</h2><div class="team-grid"><div class="team-card"><h3>📍 Guides</h3><div class="form-group"><input type="text" id="guides" placeholder="Nom..."><button onclick="addTeamItem('guides','guidesList')">Ajouter</button></div><ul class="list" id="guidesList"></ul></div><div class="team-card"><h3>🏪 Stands</h3><div class="form-group"><input type="text" id="stands" placeholder="Nom..."><button onclick="addTeamItem('stands','standsList')">Ajouter</button></div><ul class="list" id="standsList"></ul></div><div class="team-card"><h3>🎨 Ateliers</h3><div class="form-group"><input type="text" id="ateliers" placeholder="Nom..."><button onclick="addTeamItem('ateliers','ateliersList')">Ajouter</button></div><ul class="list" id="ateliersList"></ul></div><div class="team-card"><h3>👗 Défilé</h3><div class="form-group"><input type="text" id="defile" placeholder="Nom..."><button onclick="addTeamItem('defile','defileList')">Ajouter</button></div><ul class="list" id="defileList"></ul></div><div class="team-card"><h3>🔒 Sécurité</h3><div class="form-group"><input type="text" id="securite" placeholder="Nom..."><button onclick="addTeamItem('securite','securiteList')">Ajouter</button></div><ul class="list" id="securiteList"></ul></div></div></div></div><div id="achat" class="content"><div class="card"><h2>📋 Liste d'Achat</h2><div class="form-group"><input type="text" id="achatInput" placeholder="Article..."><button onclick="addAchatItem()">Ajouter</button></div><ul class="list" id="achatlist"></ul></div></div><div id="programme" class="content"><div class="card"><h2>📅 Programme</h2><textarea id="programInput" placeholder="Écrivez le programme..." style="width:100%;min-height:200px;padding:15px;border:2px solid var(--light);border-radius:8px;font-family:inherit;font-size:1em;resize:vertical"></textarea><button onclick="saveProgram()" style="width:100%;margin-top:10px">Enregistrer</button><div id="programDisplay" style="background:#f8f9fa;padding:20px;border-radius:8px;margin-top:20px;min-height:200px;white-space:pre-wrap">Programme vide...</div></div></div><footer>🌍 Événement Yennayer 2025/2026</footer></div><input type="file" id="fileInput" style="display:none"><script>const GITHUB_REPO='Spyrituel/hmdouche.com';const DATA_FILE='data.json';function switchTab(t){document.querySelectorAll('.content').forEach(e=>e.classList.remove('active')),document.querySelectorAll('.tab-btn').forEach(e=>e.classList.remove('active')),document.getElementById(t).classList.add('active'),event.target.classList.add('active')}function deleteItem(t){const e=t.parentElement;if(e){e.remove();saveAllData()}}function addTeamItem(t,e){const i=document.getElementById(t).value.trim();i&&(document.getElementById(e).innerHTML+='<li><span>'+i+'</span><button onclick="deleteItem(this)" style="background:#e74c3c;color:white;border:none;padding:5px 10px;border-radius:4px;font-size:0.85em;cursor:pointer;">✕</button></li>',document.getElementById(t).value='',saveAllData())}function addAchatItem(){const t=document.getElementById('achatInput').value.trim();t&&(document.getElementById('achatlist').innerHTML+='<li><span>'+t+'</span><button onclick="deleteItem(this)" style="background:#e74c3c;color:white;border:none;padding:5px 10px;border-radius:4px;font-size:0.85em;cursor:pointer;">✕</button></li>',document.getElementById('achatInput').value='',saveAllData())}function saveProgram(){const t=document.getElementById('programInput').value;document.getElementById('programDisplay').textContent=t,saveAllData(),alert('Programme enregistré!')}function saveAllData(){const t={guidesList:document.getElementById('guidesList').innerHTML,standsList:document.getElementById('standsList').innerHTML,ateliersList:document.getElementById('ateliersList').innerHTML,defileList:document.getElementById('defileList').innerHTML,securiteList:document.getElementById('securiteList').innerHTML,achatlist:document.getElementById('achatlist').innerHTML,programInput:document.getElementById('programInput').value,programDisplay:document.getElementById('programDisplay').textContent};localStorage.setItem('eventData',JSON.stringify(t))}function loadAllData(){const t=localStorage.getItem('eventData');if(t){const e=JSON.parse(t);document.getElementById('guidesList').innerHTML=e.guidesList||'',document.getElementById('standsList').innerHTML=e.standsList||'',document.getElementById('ateliersList').innerHTML=e.ateliersList||'',document.getElementById('defileList').innerHTML=e.defileList||'',document.getElementById('securiteList').innerHTML=e.securiteList||'',document.getElementById('achatlist').innerHTML=e.achatlist||'',document.getElementById('programInput').value=e.programInput||'',document.getElementById('programDisplay').textContent=e.programDisplay||'Programme vide...'}}function exportData(){const t=localStorage.getItem('eventData');if(!t)return void alert('Aucune donnée à exporter');const e=document.createElement('a'),i=new Blob([t],{type:'application/json'}),o=URL.createObjectURL(i);e.href=o,e.download='event-data-'+new Date().toISOString().split('T')[0]+'.json',e.click(),URL.revokeObjectURL(o)}function importData(){document.getElementById('fileInput').click()}document.getElementById('fileInput').addEventListener('change',function(t){const e=t.target.files[0];if(!e)return;const i=new FileReader;i.onload=function(t){try{const e=JSON.parse(t.target.result);localStorage.setItem('eventData',JSON.stringify(e)),loadAllData(),alert('Données importées avec succès!')}catch(e){alert('Erreur: Fichier JSON invalide')}},i.readAsText(e),t.target.value=''}),function syncWithGitHub(){alert('Sync avec GitHub: Veuillez copier vos données exportées et les partager avec d\'autres appareils en utilisant le bouton Importer')}();window.addEventListener('load',function(){loadAllData()})</script></body></html>
