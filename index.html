<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emploi du Temps - Premier Semestre</title>
    <style>
        :root {
  /* Primitive Color Tokens */
  --color-white: rgba(255, 255, 255, 1);
  --color-black: rgba(0, 0, 0, 1);
  --color-cream-50: rgba(252, 252, 249, 1);
  --color-cream-100: rgba(255, 255, 253, 1);
  --color-gray-200: rgba(245, 245, 245, 1);
  --color-gray-300: rgba(167, 169, 169, 1);
  --color-gray-400: rgba(119, 124, 124, 1);
  --color-slate-500: rgba(98, 108, 113, 1);
  --color-brown-600: rgba(94, 82, 64, 1);
  --color-charcoal-700: rgba(31, 33, 33, 1);
  --color-charcoal-800: rgba(38, 40, 40, 1);
  --color-slate-900: rgba(19, 52, 59, 1);
  --color-teal-300: rgba(50, 184, 198, 1);
  --color-teal-400: rgba(45, 166, 178, 1);
  --color-teal-500: rgba(33, 128, 141, 1);
  --color-teal-600: rgba(29, 116, 128, 1);
  --color-teal-700: rgba(26, 104, 115, 1);
  --color-teal-800: rgba(41, 150, 161, 1);
  --color-red-400: rgba(255, 84, 89, 1);
  --color-red-500: rgba(192, 21, 47, 1);
  --color-orange-400: rgba(230, 129, 97, 1);
  --color-orange-500: rgba(168, 75, 47, 1);

  /* RGB versions for opacity control */
  --color-brown-600-rgb: 94, 82, 64;
  --color-teal-500-rgb: 33, 128, 141;
  --color-slate-900-rgb: 19, 52, 59;
  --color-slate-500-rgb: 98, 108, 113;
  --color-red-500-rgb: 192, 21, 47;
  --color-red-400-rgb: 255, 84, 89;
  --color-orange-500-rgb: 168, 75, 47;
  --color-orange-400-rgb: 230, 129, 97;

  /* Background color tokens (Light Mode) */
  --color-bg-1: rgba(59, 130, 246, 0.08);
  --color-bg-2: rgba(245, 158, 11, 0.08);
  --color-bg-3: rgba(34, 197, 94, 0.08);
  --color-bg-4: rgba(239, 68, 68, 0.08);
  --color-bg-5: rgba(147, 51, 234, 0.08);
  --color-bg-6: rgba(249, 115, 22, 0.08);
  --color-bg-7: rgba(236, 72, 153, 0.08);
  --color-bg-8: rgba(6, 182, 212, 0.08);

  /* Semantic Color Tokens (Light Mode) */
  --color-background: var(--color-cream-50);
  --color-surface: var(--color-cream-100);
  --color-text: var(--color-slate-900);
  --color-text-secondary: var(--color-slate-500);
  --color-primary: var(--color-teal-500);
  --color-primary-hover: var(--color-teal-600);
  --color-primary-active: var(--color-teal-700);
  --color-secondary: rgba(var(--color-brown-600-rgb), 0.12);
  --color-secondary-hover: rgba(var(--color-brown-600-rgb), 0.2);
  --color-secondary-active: rgba(var(--color-brown-600-rgb), 0.25);
  --color-border: rgba(var(--color-brown-600-rgb), 0.2);
  --color-btn-primary-text: var(--color-cream-50);
  --color-card-border: rgba(var(--color-brown-600-rgb), 0.12);
  --color-card-border-inner: rgba(var(--color-brown-600-rgb), 0.12);
  --color-error: var(--color-red-500);
  --color-success: var(--color-teal-500);
  --color-warning: var(--color-orange-500);
  --color-info: var(--color-slate-500);
  --color-focus-ring: rgba(var(--color-teal-500-rgb), 0.4);
  --color-select-caret: rgba(var(--color-slate-900-rgb), 0.8);

  /* Typography */
  --font-family-base: "FKGroteskNeue", "Geist", "Inter", -apple-system,
    BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --font-size-xs: 11px;
  --font-size-sm: 12px;
  --font-size-base: 14px;
  --font-size-md: 14px;
  --font-size-lg: 16px;
  --font-size-xl: 18px;
  --font-size-2xl: 20px;
  --font-size-3xl: 24px;
  --font-size-4xl: 30px;
  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 550;
  --font-weight-bold: 600;
  --line-height-tight: 1.2;
  --line-height-normal: 1.5;

  /* Spacing */
  --space-4: 4px;
  --space-8: 8px;
  --space-12: 12px;
  --space-16: 16px;
  --space-20: 20px;
  --space-24: 24px;
  --space-32: 32px;

  /* Border Radius */
  --radius-sm: 6px;
  --radius-base: 8px;
  --radius-md: 10px;
  --radius-lg: 12px;
  --radius-full: 9999px;

  /* Shadows */
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.04),
    0 2px 4px -1px rgba(0, 0, 0, 0.02);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.04),
    0 4px 6px -2px rgba(0, 0, 0, 0.02);

  /* Animation */
  --duration-fast: 150ms;
  --duration-normal: 250ms;
  --ease-standard: cubic-bezier(0.16, 1, 0.3, 1);
}

@media (prefers-color-scheme: dark) {
  :root {
    --color-gray-400-rgb: 119, 124, 124;
    --color-teal-300-rgb: 50, 184, 198;
    --color-gray-300-rgb: 167, 169, 169;
    --color-gray-200-rgb: 245, 245, 245;

    --color-bg-1: rgba(29, 78, 216, 0.15);
    --color-bg-2: rgba(180, 83, 9, 0.15);
    --color-bg-3: rgba(21, 128, 61, 0.15);
    --color-bg-4: rgba(185, 28, 28, 0.15);
    --color-bg-5: rgba(107, 33, 168, 0.15);
    --color-bg-6: rgba(194, 65, 12, 0.15);
    --color-bg-7: rgba(190, 24, 93, 0.15);
    --color-bg-8: rgba(8, 145, 178, 0.15);

    --color-background: var(--color-charcoal-700);
    --color-surface: var(--color-charcoal-800);
    --color-text: var(--color-gray-200);
    --color-text-secondary: rgba(var(--color-gray-300-rgb), 0.7);
    --color-primary: var(--color-teal-300);
    --color-primary-hover: var(--color-teal-400);
    --color-primary-active: var(--color-teal-800);
    --color-secondary: rgba(var(--color-gray-400-rgb), 0.15);
    --color-secondary-hover: rgba(var(--color-gray-400-rgb), 0.25);
    --color-secondary-active: rgba(var(--color-gray-400-rgb), 0.3);
    --color-border: rgba(var(--color-gray-400-rgb), 0.3);
    --color-error: var(--color-red-400);
    --color-success: var(--color-teal-300);
    --color-warning: var(--color-orange-400);
    --color-info: var(--color-gray-300);
    --color-focus-ring: rgba(var(--color-teal-300-rgb), 0.4);
    --color-btn-primary-text: var(--color-slate-900);
    --color-card-border: rgba(var(--color-gray-400-rgb), 0.2);
    --color-card-border-inner: rgba(var(--color-gray-400-rgb), 0.15);
  }
}

@font-face {
  font-family: 'FKGroteskNeue';
  src: url('https://r2cdn.perplexity.ai/fonts/FKGroteskNeue.woff2')
    format('woff2');
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Geist', 'FKGroteskNeue', 'Inter', Arial, sans-serif;
    background: linear-gradient(180deg, #fff 0%, #f3f8ff 100%) !important;
    color: var(--color-text);
    line-height: var(--line-height-normal);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    transition: background 0.4s var(--ease-standard);
}


.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: var(--space-24);
}

.header {
    text-align: center;
    margin-bottom: var(--space-32);
    padding: var(--space-32) 0;
    background: linear-gradient(90deg, #beeafe 0%, #ffd6e0 100%);
    border-radius: var(--radius-lg);
    box-shadow: 0 4px 20px rgba(100,184,230,0.08);
    animation: fade-slide-up 0.7s var(--ease-standard);
}

.header h1 {
    font-size: var(--font-size-4xl);
    font-weight: var(--font-weight-bold);
    color: #2d4458;
    margin-bottom: var(--space-8);
    letter-spacing: 0.5px;
    text-shadow: 0 1px 0 #fff, 0 2px 8px #d3edfd;
    transition: color 0.4s var(--ease-standard);
    font-family: "Geist", "FKGroteskNeue", "Inter", Arial, sans-serif;
}

.header p {
    font-size: var(--font-size-lg);
    color: #39809c;
    opacity: 0.75;
    font-weight: 500;
    letter-spacing: 0.15em;
}

.class-name {
    font-size: 22px;
    font-weight: 580;
    color: #2d5a7a;
    margin: var(--space-12) 0 var(--space-16) 0;
    padding: var(--space-12) var(--space-24);
    background: linear-gradient(90deg, rgba(255,255,255,0.65) 0%, rgba(255,255,255,0.45) 100%);
    border-radius: var(--radius-base);
    display: inline-block;
    border: 1.5px solid rgba(100,180,230,0.25);
    box-shadow: 0 2px 12px rgba(120,195,240,0.12);
    letter-spacing: 0.02em;
    transition: all 0.3s var(--ease-standard);
}

.nav-tabs {
    display: flex;
    justify-content: center;
    gap: var(--space-8);
    margin-bottom: var(--space-32);
    flex-wrap: wrap;
    position: relative;
    animation: fade-in 1s var(--ease-standard);
}

.nav-tab {
    position: relative;
    padding: var(--space-12) var(--space-24);
    background: linear-gradient(90deg,#e4efff 0%,#ffeeeb 100%);
    border: 1px solid var(--color-card-border);
    border-radius: var(--radius-base);
    cursor: pointer;
    font-size: var(--font-size-base);
    font-weight: var(--font-weight-medium);
    color: var(--color-text);
    transition: background 0.3s var(--ease-standard), color 0.3s, box-shadow 0.3s, transform 0.22s var(--ease-standard);
    box-shadow: var(--shadow-xs);
    outline: none;
    overflow: hidden;
}

.nav-tab.active {
    background: linear-gradient(90deg,#8ceabb 0%,#3786f8 100%);
    color: #fff;
    border-color: #6bc3f3;
    box-shadow: 0 2px 16px #7ad9df44, 0 1px 0 #fff;
}

.nav-tab::after {
    content: "";
    position: absolute;
    left: 16px;
    right: 16px;
    bottom: 6px;
    height: 3px;
    border-radius: 2px;
    background: linear-gradient(90deg,#47a8ed 0%,#ff97ab 100%);
    opacity: 0;
    transform: scaleX(0.3);
    transition: all 0.32s var(--ease-standard);
}

.nav-tab.active::after {
    opacity: 1;
    transform: scaleX(1);
}

.nav-tab:hover {
    background: linear-gradient(90deg,#e1f3fb 0%,#ffeae4 100%);
    color: #399dc8;
    transform: translateY(-3px) scale(1.08);
    box-shadow: 0 5px 18px rgba(144,193,237,0.10);
}

.nav-tab:active {
    transform: scale(0.97);
    box-shadow: 0 1px 3px #ccc;
}

.schedule-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: var(--space-20);
    margin-bottom: var(--space-32);
}

.course-card {
    background: linear-gradient(120deg,#fff 70%,rgba(66,186,224,0.07) 100%);
    border-radius: var(--radius-lg);
    border: 1.5px solid var(--color-card-border);
    padding: var(--space-24) var(--space-20) var(--space-20) var(--space-20);
    cursor: pointer;
    transition: transform 0.28s var(--ease-standard), box-shadow 0.28s var(--ease-standard), background 0.35s, filter 0.28s;
    box-shadow: 0 2px 24px 0 rgba(166,214,255,0.08), 0 0px 0px #fff;
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateY(32px);
    animation: fade-slide-up 0.7s var(--ease-standard) forwards;
}

.course-card[data-animated] {
    opacity: 1 !important;
    transform: translateY(0) !important;
}

.course-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 8px;
    height: 100%;
    border-radius: 8px 0 0 8px;
    filter: blur(1px);
    transition: width 0.36s, background 0.3s;
    z-index: 1;
}

.course-card.teal::before { background: linear-gradient(90deg,#81e8e3 50%,#1fb8cd 100%); }
.course-card.blue::before { background: linear-gradient(90deg,#a6d7ff 0%,#3b82f6 100%); }
.course-card.purple::before { background: linear-gradient(90deg,#ede7ff 0%,#9333ea 100%); }
.course-card.orange::before { background: linear-gradient(90deg,#fff3e1 0%,#f97316 100%); }
.course-card.red::before { background: linear-gradient(90deg,#ffd8e0 0%,#ef4444 100%); }
.course-card.green::before { background: linear-gradient(90deg,#dbfce7 0%,#22c55e 100%); }
.course-card.indigo::before { background: linear-gradient(90deg,#cfd7fe 0%,#6366f1 100%); }
.course-card.crimson::before { background: linear-gradient(90deg,#ffe2e7 0%,#dc2626 100%); }
.course-card.amber::before { background: linear-gradient(90deg,#fff9e4 0%,#fbbf24 100%); }

.course-card:hover {
    transform: translateY(-7px) scale(1.04);
    box-shadow: 0 8px 48px 0 rgba(167,207,255,0.18);
    background: linear-gradient(120deg,#e6faff 84%,rgba(203,249,255,0.17) 100%);
    filter: brightness(1.06) saturate(1.015);
}

.course-card:active {
    transform: scale(0.96);
    background: linear-gradient(120deg,#f7fbff 80%,#eafcff 99%);
    box-shadow: 0 2px 10px #aacaff31;
    filter: brightness(1.025) contrast(1.05);
}

.course-card[data-ripple]::after {
    content: '';
    position: absolute;
    left: var(--ripple-x, 50%);
    top: var(--ripple-y, 40%);
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(72,176,255,0.15);
    pointer-events: none;
    animation: ripple 0.7s cubic-bezier(.22,1,.29,1) forwards;
    z-index: 2;
}
@keyframes ripple {
    to {
      width: 420px;
      height: 420px;
      opacity: 0;
    }
}

.course-card:hover::before {
    width: 14px;
}

.course-card:active::before {
    width: 20px;
}


.course-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 4px;
    height: 100%;
    transition: width var(--duration-normal) var(--ease-standard);
}

.course-card.teal::before { background-color: var(--color-primary); }
.course-card.blue::before { background: #3b82f6; }
.course-card.purple::before { background: #9333ea; }
.course-card.orange::before { background: #f97316; }
.course-card.red::before { background: #ef4444; }
.course-card.green::before { background: #22c55e; }
.course-card.indigo::before { background: #6366f1; }
.course-card.crimson::before { background: #dc2626; }
.course-card.amber::before { background: #f59e0b; }

.course-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
}

.course-card:hover::before {
    width: 8px;
}

.course-time {
    display: inline-block;
    font-size: var(--font-size-sm);
    font-weight: 550;
    color: #3e96de;
    background: linear-gradient(90deg,rgba(131,213,253,0.16) 0%,rgba(255,202,211,0.18) 100%);
    padding: 7px 18px 7px 16px;
    border-radius: 19px;
    margin-bottom: var(--space-12);
    transition: all 0.28s var(--ease-standard);
    border: 1px solid rgba(121,190,242,0.14);
    box-shadow: 0 1px 6px rgba(131,217,247,0.06);
}

.course-card:hover .course-time {
    background: linear-gradient(90deg,rgba(131,213,253,0.28) 0%,rgba(255,202,211,0.3) 100%);
    color: #3491ce;
    box-shadow: 0 2px 12px rgba(131,217,247,0.11);
    transform: scale(1.028);
}

.course-title {
    font-size: 18px;
    font-weight: 590;
    color: #2a4659;
    margin-bottom: var(--space-8);
    line-height: 1.35;
    letter-spacing: -0.015em;
    transition: color 0.27s, transform 0.28s;
}

.course-card:hover .course-title {
    color: #204368;
    transform: translateX(2px);
}

.course-professor {
    font-size: var(--font-size-base);
    color: #6995b3;
    display: flex;
    align-items: center;
    gap: var(--space-8);
    font-weight: 500;
    opacity: 0.87;
    transition: all 0.27s;
}

.course-professor::before {
    content: '👨‍🏫';
    font-size: var(--font-size-lg);
    transition: transform 0.28s var(--ease-standard);
    display: inline-block;
}

.course-card:hover .course-professor::before {
    transform: scale(1.14) rotate(3deg);
}

.course-card:hover .course-professor {
    color: #4d85ab;
    opacity: 1;
}

.empty-state {
    text-align: center;
    padding: var(--space-32);
    background: linear-gradient(135deg,#fef5ff 0%,#f9fffe 100%);
    border-radius: var(--radius-lg);
    border: 1.5px solid rgba(168,224,255,0.18);
    box-shadow: 0 3px 28px rgba(195,232,250,0.1);
    animation: fade-in 0.9s var(--ease-standard);
}

.empty-state-icon {
    font-size: 62px;
    margin-bottom: var(--space-16);
    animation: bounce 2.1s infinite;
    display: inline-block;
    filter: drop-shadow(0 3px 9px rgba(255,217,156,0.14));
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
}

.empty-state-text {
    font-size: 22px;
    color: #5696c3;
    font-weight: 540;
    letter-spacing: 0.028em;
}

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(142deg,rgba(88,137,176,0.54) 0%,rgba(129,180,222,0.42) 100%);
    backdrop-filter: blur(6px);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: var(--space-20);
    animation: fade-in 0.32s var(--ease-standard);
}

.modal.active {
    display: flex;
}

.modal-content {
    background: linear-gradient(155deg,#fff 50%,#f8fdff 100%);
    border-radius: 16px;
    padding: var(--space-32);
    max-width: 620px;
    width: 100%;
    position: relative;
    box-shadow: 0 12px 64px rgba(120,185,235,0.17), 0 1px 0 #fff;
    max-height: 90vh;
    overflow-y: auto;
    border: 1.5px solid rgba(168,218,255,0.28);
}

.modal-close {
    position: absolute;
    top: var(--space-16);
    right: var(--space-16);
    background: linear-gradient(135deg,#ffe9ed 0%,#e8f5ff 100%);
    border: 1px solid rgba(188,224,255,0.22);
    font-size: 21px;
    cursor: pointer;
    color: #5a8db7;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 9px;
    transition: all 0.25s var(--ease-standard);
    font-weight: 400;
    box-shadow: 0 1px 6px rgba(176,217,255,0.06);
}

.modal-close:hover {
    background: linear-gradient(135deg,#ffd9e4 0%,#d6eeff 100%);
    color: #3e7fb8;
    transform: rotate(90deg) scale(1.12);
    box-shadow: 0 3px 18px rgba(176,217,255,0.14);
}

.modal-close:active {
    transform: rotate(90deg) scale(0.94);
    background: linear-gradient(135deg,#ffc9d7 0%,#cde6ff 100%);
}

.modal-header {
    margin-bottom: var(--space-24);
    padding-right: var(--space-32);
}

.modal-title {
    font-size: 27px;
    font-weight: 620;
    color: #2a4659;
    margin-bottom: var(--space-8);
    letter-spacing: -0.02em;
    line-height: 1.28;
    background: linear-gradient(90deg,#2a4659 0%,#3a7aac 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
}

.modal-subtitle {
    font-size: 15px;
    color: #5d91ba;
    display: flex;
    flex-direction: column;
    gap: var(--space-4);
    font-weight: 500;
}

.modal-body {
    margin-top: var(--space-24);
}

.modal-section {
    margin-bottom: var(--space-20);
    background: linear-gradient(135deg,rgba(215,243,255,0.12) 0%,rgba(255,235,240,0.14) 100%);
    padding: 18px 20px;
    border-radius: 11px;
    border: 1px solid rgba(163,218,255,0.17);
}

.modal-section-title {
    font-size: 13px;
    font-weight: 610;
    color: #4da0d6;
    margin-bottom: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
}

.modal-section-content {
    font-size: 15px;
    color: #3d5f78;
    line-height: 1.65;
    font-weight: 450;
}

@media (max-width: 768px) {
    .container {
        padding: var(--space-16);
    }

    .header h1 {
        font-size: var(--font-size-3xl);
    }

    .schedule-container {
        grid-template-columns: 1fr;
    }

    .modal-content {
        padding: var(--space-24);
    }

    .modal-title {
        font-size: var(--font-size-2xl);
    }
}
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📅 Emploi du Temps</h1>
            <div class="class-name">ASRI 1 Groupe 7</div>
            <p>Premier Semestre - Dimanche à Mercredi</p>
        </header>

        <nav class="nav-tabs" id="navTabs">
            <button class="nav-tab active" data-day="dimanche">Dimanche</button>

        function openModal(courseId, day, card) {

    modal.classList.add('active');

    }, 10);
}

function closeModal() {
    const modal = document.getElementById('modal');
    const modalContent = modal.querySelector('.modal-content');
    modalContent.style.transition = 'opacity 0.28s var(--ease-standard), transform 0.32s var(--ease-standard)';
    modalContent.style.opacity = 0;
    modalContent.style.transform = 'translateY(44px) scale(0.97)';
    setTimeout(() => {
        modal.classList.remove('active');
        modalContent.style.transition = '';
        modalContent.style.opacity = '';
        modalContent.style.transform = '';
    }, 320);
}
